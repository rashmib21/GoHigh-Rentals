<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - GoHigh Rentals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navigation (same as about.html) -->
    <nav class="navbar navbar-scrolled">
        <!-- same navigation code -->
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 data-aos="fade-up">Contact Us</h1>
            <div class="breadcrumb" data-aos="fade-up" data-aos-delay="100">
                <a href="{{ url_for('index') }}">Home</a> / <span>Contact</span>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section" style="padding: 80px 5%;">
        <div class="container">
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 50px;">
                <!-- Contact Info -->
                <div>
                    <h2 style="font-size: 2rem; margin-bottom: 30px;">Get In Touch</h2>
                    
                    <div style="margin-bottom: 30px;">
                        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                            <i class="fas fa-map-marker-alt" style="font-size: 1.5rem; color: #f05454;"></i>
                            <div>
                                <h3 style="margin-bottom: 5px;">Visit Us</h3>
                                <p style="color: #666;">Main Bazaar, Manali<br>Himachal Pradesh 175131</p>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                            <i class="fas fa-phone" style="font-size: 1.5rem; color: #f05454;"></i>
                            <div>
                                <h3 style="margin-bottom: 5px;">Call Us</h3>
                                <p style="color: #666;">+91 98765 43210<br>+91 98765 43211</p>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                            <i class="fas fa-envelope" style="font-size: 1.5rem; color: #f05454;"></i>
                            <div>
                                <h3 style="margin-bottom: 5px;">Email Us</h3>
                                <p style="color: #666;">info@gohighrentals.com<br>bookings@gohighrentals.com</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Contact Form -->
                <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    <h2 style="margin-bottom: 30px;">Send a Message</h2>
                    <form method="POST">
                        <div style="margin-bottom: 20px;">
                            <input type="text" name="name" placeholder="Your Name" required style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <input type="email" name="email" placeholder="Your Email" required style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <input type="text" name="subject" placeholder="Subject" style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <textarea name="message" placeholder="Your Message" rows="5" required style="width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;"></textarea>
                        </div>
                        <button type="submit" style="width: 100%; padding: 15px; background: #f05454; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer;">
                            Send Message <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Map Section -->
    <section class="map-section" style="padding: 0 5% 80px;">
        <div class="container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3392.764617215812!2d77.17446831516078!3d32.239580814745!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3904870b5f8f1b7b%3A0x8f6a6f7f7f7f7f7f!2sManali!5e0!3m2!1sen!2sin!4v1620000000000!5m2!1sen!2sin" width="100%" height="400" style="border:0; border-radius: 20px;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <!-- Footer (same as about.html) -->
    <footer class="footer">
        <!-- same footer code -->
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
