<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - GoHigh Rentals</title>
    <link rel="icon" type="image/png" 
          href="https://img.icons8.com/fluency/48/mountain.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="register-page">

<div class="form-box">
    <i class="fas fa-mountain" style="font-size: 3rem; color: #c31432; margin-bottom: 10px;"></i>
    <h2>Start Your Journey</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div style="position: relative;">
            <i class="fas fa-user" style="position: absolute; left: 15px; top: 27px; color: #999;"></i>
            <input type="text"
                   name="name"
                   placeholder="Enter your full name"
                   pattern="^[A-Za-z]{2,}(?:\s[A-Za-z]{2,})+$"
                   maxlength="30"
                   title="Enter your full name (first and last name)"
                   autocomplete="name"
                   required
                   style="padding-left: 45px;">
        </div>

        <div style="position: relative;">
            <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 27px; color: #999;"></i>
            <input type="email"
                   name="email"
                   placeholder="Enter your email address"
                   autocomplete="email"
                   required
                   style="padding-left: 45px;">
        </div>

        <div style="position: relative;">
            <i class="fas fa-phone" style="position: absolute; left: 15px; top: 27px; color: #999;"></i>
            <input type="tel"
                   name="phone_no"
                   pattern="^[6-9][0-9]{9}$"
                   maxlength="10"
                   placeholder="Enter your 10-digit mobile number"
                   title="Mobile number must start with 6, 7, 8 or 9"
                   autocomplete="tel"
                   required
                   style="padding-left: 45px;">
        </div>

        <div style="position: relative;">
            <i class="fas fa-lock" style="position: absolute; left: 15px; top: 27px; color: #999;"></i>
            <input type="password"
                   name="password"
                   maxlength="15" 
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                   placeholder="Create a strong password"
                   title="Minimum 8 characters with uppercase, lowercase, number and special character"
                   autocomplete="new-password"
                   required
                   style="padding-left: 45px;">
        </div>

        <button type="submit">
            <i class="fas fa-user-plus"></i> Register
        </button>
    </form>

    <p class="form-link">
        Already have an account?
        <a href="/login">Login →</a>
    </p>
</div>

</body>
</html>
